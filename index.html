<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mind Music AR — Hand-Controlled Music Machine</title>
    <link rel="stylesheet" href="styles.css" />

    <!-- Primary Meta Tags -->
    <meta name="title" content="Mind Music AR" />
    <meta
      name="description"
      content="Control music with your hands — hand-tracked arp, drum machine and real-time waveform visualizer powered by MediaPipe & Tone.js"
    />
    <meta name="theme-color" content="#0a0b14" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mind Music AR" />
    <meta
      property="og:description"
      content="Control music with your hands in AR"
    />
    <meta property="og:image" content="assets/images/siteOGImage.webp" />

    <!-- Analytics -->
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="eb59c81c-27cb-4e1d-9e8c-bfbe70c48cd9"
    ></script>

    <!-- Import Maps for Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.161.0?dev",
          "three/": "https://esm.sh/three@0.161.0&dev/"
        }
      }
    </script>
  </head>
  <body>
    <!-- ── Loading Screen ───────────────────────────────────── -->
    <div id="loading-screen" role="status" aria-label="Loading Mind Music AR">
      <div class="loading-logo" aria-hidden="true">🪬</div>
      <h1 class="loading-title">Mind Music AR</h1>
      <p class="loading-subtitle">Hand-Controlled Music Machine</p>
      <div class="loading-spinner" aria-hidden="true"></div>
      <p class="loading-status" id="loading-status-text">
        Initialising audio engine…
      </p>
      <div class="loading-progress-bar">
        <div class="loading-progress-fill" id="loading-progress-fill"></div>
      </div>
    </div>

    <!-- ── Main App ──────────────────────────────────────────── -->
    <div
      id="renderDiv"
      style="width: 100vw; height: 100vh; margin: 0; position: relative"
    >
      <!-- Logo -->
      <span id="logo" aria-hidden="true">🪬</span>

      <!-- Info Text (top centre) -->
      <span id="info-text" role="status" aria-live="polite">
        Raise your hands to raise the roof 🎶
      </span>

      <!-- Canvas Container (Three.js + video feed) -->
      <div id="canvas-container" style="width: 100%; height: 100%">
        <canvas id="canvas" style="display: block; width: 100%; height: 100%"></canvas>
      </div>

      <!-- Toast Notifications -->
      <div id="toast-container" aria-live="assertive"></div>

      <!-- Keyboard Shortcut Hints -->
      <div id="kbd-hints" aria-hidden="true">
        <span class="kbd-hint"><span class="kbd">G</span> Gesture Guide</span>
        <span class="kbd-hint"><span class="kbd">C</span> Camera Color</span>
        <span class="kbd-hint"><span class="kbd">R</span> Restart</span>
        <span class="kbd-hint"><span class="kbd">Space</span> Play/Pause</span>
      </div>
    </div>

    <!-- Modules -->
    <script type="module" src="js/music-controls.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
